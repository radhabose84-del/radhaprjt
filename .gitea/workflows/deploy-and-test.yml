name: Deploy to QA and Run Tests

on:
  push:
    branches:
      - BSOFTERP_Dev_V0.1

# Retarget the live-test fixtures at the deployed QA app (overrides appsettings.QA.json,
# which defaults to localhost:5239). QAServer__Username / __Password can be overridden the
# same way if the QA test user differs.
env:
  QAServer__BaseUrl: http://198.168.1.130/BsoftErp

jobs:
  deploy-and-test:
    runs-on: self-hosted        # runs on QA server (198.168.1.130)

    steps:

      # ── Step 1: Get latest code ─────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ── Step 2: Setup .NET 8 ────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      # ── Step 3: Restore packages ────────────────────────────────────────
      - name: Restore packages
        run: dotnet restore BSOFT.sln

      # ── Step 4: Build ───────────────────────────────────────────────────
      - name: Build BSOFT.Api
        run: dotnet build src/BSOFT.Api/BSOFT.Api.csproj -c Release --no-restore

      # ── Step 5: Publish ─────────────────────────────────────────────────
      - name: Publish BSOFT.Api
        run: dotnet publish src/BSOFT.Api/BSOFT.Api.csproj -c Release -o publish/api --no-build

      # ── Step 6: Stop IIS App Pool ───────────────────────────────────────
      - name: Stop IIS App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          if ((Get-WebAppPoolState -Name "BsoftERP").Value -eq "Started") {
            Stop-WebAppPool -Name "BsoftERP"
            Write-Host "App pool stopped."
            Start-Sleep -Seconds 3
          }

      # ── Step 7: Deploy files to QA server ──────────────────────────────
      - name: Deploy to D:\Publish\BsoftERP
        shell: powershell
        run: |
          robocopy publish\api D:\Publish\BsoftERP /MIR /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -ge 8) { throw "robocopy failed ($LASTEXITCODE)" } else { $global:LASTEXITCODE = 0 }
          Write-Host "Files deployed."

      # ── Step 8: Start IIS App Pool ──────────────────────────────────────
      - name: Start IIS App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          Start-WebAppPool -Name "BsoftERP"
          Write-Host "App pool started."

      # ── Step 9: Wait for app to be ready ────────────────────────────────
      - name: Wait for QA server to be ready
        shell: powershell
        run: |
          Write-Host "Waiting 20 seconds for IIS to recycle..."
          Start-Sleep -Seconds 20
          $ready = $false
          for ($i = 1; $i -le 5; $i++) {
            try {
              Invoke-RestMethod "$env:QAServer__BaseUrl/api/auth/deactivate-user-sessionByUsername" `
                -Method Post -ContentType "application/json" `
                -Body '{"username":"testsales","password":"Test@1234"}' `
                -ErrorAction Stop | Out-Null
              $ready = $true
              Write-Host "QA server is ready."
              break
            } catch {
              Write-Host "Attempt $i/5 - waiting 5s..."
              Start-Sleep -Seconds 5
            }
          }
          if (-not $ready) { throw "QA server not responding after deployment." }

      # ── Step 10: SMOKE GATE (fail fast) ─────────────────────────────────
      # If the deployed app can't serve the critical read paths, stop here — no point
      # running the full suite against a broken deploy. A failing step fails the job.
      - name: Smoke gate
        shell: powershell
        run: |
          dotnet test src/tests/UserManagement.QATests/UserManagement.QATests.csproj `
            --filter "Layer=Smoke" `
            --logger "trx;LogFileName=smoke.trx" `
            --logger "console;verbosity=normal" `
            --results-directory qa-reports

      # ── Step 11: Full QA suite (CRUD + Security + Async) ────────────────
      - name: Run QA suite
        if: success()
        shell: powershell
        run: |
          dotnet test src/tests/UserManagement.QATests/UserManagement.QATests.csproj `
            --logger "html;LogFileName=qa-report.html" `
            --logger "trx;LogFileName=qa.trx" `
            --logger "console;verbosity=normal" `
            --results-directory qa-reports

      # ── Step 12: Functional workflow tests ──────────────────────────────
      - name: Run Functional tests
        if: success()
        shell: powershell
        run: |
          dotnet test src/tests/UserManagement.FunctionalTests/UserManagement.FunctionalTests.csproj `
            --logger "html;LogFileName=functional-report.html" `
            --logger "trx;LogFileName=functional.trx" `
            --logger "console;verbosity=normal" `
            --results-directory qa-reports

      # ── Step 13: Upload all reports (always) ────────────────────────────
      - name: Upload test reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: QA-Test-Reports
          path: qa-reports/

      # ── Step 14: Notify Slack on failure ────────────────────────────────
      # Parses every .trx for failed tests and posts a grouped summary. The failed test
      # names carry their class (US_UM_01..., {Entity}QATests) so the owner is identifiable.
      - name: Notify Slack on failure
        if: failure()
        shell: powershell
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if (-not $env:SLACK_WEBHOOK_URL) { Write-Host "No SLACK_WEBHOOK_URL secret set — skipping."; exit 0 }

          $failed = @(); $total = 0; $pass = 0; $fail = 0
          Get-ChildItem qa-reports -Filter *.trx -ErrorAction SilentlyContinue | ForEach-Object {
            try {
              [xml]$trx = Get-Content $_.FullName
              $c = $trx.TestRun.ResultSummary.Counters
              if ($c) { $total += [int]$c.total; $pass += [int]$c.passed; $fail += [int]$c.failed }
              $trx.TestRun.Results.UnitTestResult |
                Where-Object { $_.outcome -eq 'Failed' } |
                ForEach-Object { $failed += $_.testName }
            } catch { Write-Host "Could not parse $($_.Name): $_" }
          }

          $branch = "${{ github.ref_name }}"
          $sha    = "${{ github.sha }}".Substring(0,8)
          $lines  = ($failed | Select-Object -First 20 | ForEach-Object { "• $_" }) -join "`n"
          if ($failed.Count -gt 20) { $lines += "`n…and $($failed.Count - 20) more" }
          $text = ":x: *QA pipeline failed* on ``$branch`` ($sha)`n" +
                  "Passed: $pass  Failed: $fail  Total: $total`n" +
                  "*Failed tests:*`n$lines"

          $payload = @{ text = $text } | ConvertTo-Json -Depth 4
          Invoke-RestMethod -Uri $env:SLACK_WEBHOOK_URL -Method Post -ContentType 'application/json' -Body $payload
          Write-Host "Slack notified."
