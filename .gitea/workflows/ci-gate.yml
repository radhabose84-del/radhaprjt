name: CI Gate (build + unit)

# FAST merge gate — build + UNIT tests only. NO coverage, NO integration, NO Sonar, NO deploy.
# Purpose: quick (<~20 min) green/red signal on every PR/push so the dev branch stays healthy.
# The slow stuff (integration + coverage + SonarQube) runs in ci-nightly.yml off-hours.
on:
  # Run on PRs into the protected branches so the gate can be a REQUIRED merge check
  # (feature branch -> PR -> green CI -> merge). Keeps the dev branch always-green.
  pull_request:
    branches:
      - BSOFTERP_Dev_V0.1
      - Main
  # Also run on direct pushes (transition period / hotfixes on the protected branches).
  push:
    branches:
      - BSOFTERP_Dev_V0.1
      - Main
  workflow_dispatch:

# One run at a time per ref. A newer push cancels the older run — we only care about
# the latest commit. On PRs the ref is the PR, so PRs don't cancel each other.
concurrency:
  group: ci-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-gate:
    runs-on: self-hosted
    timeout-minutes: 30   # fast gate; if it's taking longer, something is wrong

    steps:
      # ── Step 1: Checkout ─────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ── Step 2: Setup .NET 8 ─────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      # ── Step 3: Restore packages ─────────────────────────────────────────
      - name: Restore packages
        run: dotnet restore BSOFT.sln

      # ── Step 4: Build ─────────────────────────────────────────────────────
      - name: Build BSOFT.Api
        run: dotnet build src/BSOFT.Api/BSOFT.Api.csproj -c Release --no-restore

      # ── Step 5: Unit tests (module-wise, NO coverage) ────────────────────
      # Coverage collection (XPlat/opencover) was the main slowdown — it is run NIGHTLY only,
      # where Sonar consumes it. Here we just need a fast pass/fail. Unit tests do not need SQL.
      - name: Unit tests (module-wise)
        shell: powershell
        run: |
          $failed = @()
          Get-ChildItem src/tests -Recurse -Filter *.UnitTests.csproj | Sort-Object FullName | ForEach-Object {
            Write-Host "=== Unit: $($_.BaseName) ==="
            dotnet test $_.FullName -c Release --logger "trx;LogFileName=$($_.BaseName).trx" --results-directory ci-reports
            if ($LASTEXITCODE -ne 0) { $failed += $_.BaseName }
          }
          if ($failed.Count) { throw "Unit tests FAILED in: $($failed -join ', ')" }
          Write-Host "All unit test projects passed."

      # ── Step 6: Upload reports (always) ──────────────────────────────────
      - name: Upload test reports
        uses: actions/upload-artifact@v3
        if: always()
        continue-on-error: true
        with:
          name: CI-Gate-Reports-r${{ github.run_number }}-${{ github.sha }}
          path: ci-reports/

      # ── Step 7: Notify Slack on failure ──────────────────────────────────
      - name: Notify Slack on failure
        if: failure()
        shell: powershell
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if (-not $env:SLACK_WEBHOOK_URL) { Write-Host "No SLACK_WEBHOOK_URL - skipping."; exit 0 }

          $failed = @(); $total = 0; $pass = 0; $fail = 0
          $byModule = @{}
          Get-ChildItem ci-reports -Filter *.trx -ErrorAction SilentlyContinue | ForEach-Object {
            try {
              [xml]$trx = Get-Content $_.FullName
              $c = $trx.TestRun.ResultSummary.Counters
              if ($c) { $total += [int]$c.total; $pass += [int]$c.passed; $fail += [int]$c.failed }
              $trx.TestRun.Results.UnitTestResult |
                Where-Object { $_.outcome -eq 'Failed' } |
                ForEach-Object {
                  $failed += $_.testName
                  # Module = first segment of the fully-qualified test name (e.g. "FinanceManagement.UnitTests...").
                  $mod = ($_.testName -split '\.')[0]
                  if (-not $mod) { $mod = 'Unknown' }
                  if ($byModule.ContainsKey($mod)) { $byModule[$mod]++ } else { $byModule[$mod] = 1 }
                }
            } catch {}
          }

          $branch = "${{ github.ref_name }}"
          $sha    = "${{ github.sha }}".Substring(0,8)
          $modLines = ($byModule.GetEnumerator() | Sort-Object Value -Descending |
                       ForEach-Object { "- $($_.Key): $($_.Value) failed" }) -join "`n"
          $modCount = $byModule.Keys.Count
          $lines  = ($failed | Select-Object -First 15 | ForEach-Object { "- $_" }) -join "`n"
          if ($failed.Count -gt 15) { $lines += "`n...and $($failed.Count - 15) more" }

          $text = ":x: *CI Gate FAILED* on ``$branch`` ($sha) - $fail test(s) across $modCount module(s)`n" +
                  "Passed: $pass  Failed: $fail  Total: $total`n" +
                  "*Failures by module:*`n$modLines`n" +
                  "*Failed tests:*`n$lines"

          $payload = @{ text = $text } | ConvertTo-Json -Depth 4
          Invoke-RestMethod -Uri $env:SLACK_WEBHOOK_URL -Method Post -ContentType 'application/json' -Body $payload
