syntax = "proto3";

option csharp_namespace = "UserService.Grpc";

// Currency service
service CurrencyService {
  rpc GetById (GetCurrencyByIdRequest) returns (GetCurrencyByIdResponse);
  rpc SearchByName (SearchCurrenciesRequest) returns (CurrencyListResponse);
  rpc GetByIds (GetCurrenciesByIdsRequest) returns (CurrencyListResponse);
}

// messages
message GetCurrencyByIdRequest {
  int32 id = 1;
}

message GetCurrencyByIdResponse {
  CurrencyDto currency = 1;
}

message SearchCurrenciesRequest {
  string query = 1; // substring (LIKE %query%)
}

message GetCurrenciesByIdsRequest {
  repeated int32 ids = 1;
}

message CurrencyListResponse {
  repeated CurrencyDto items = 1;
}

message CurrencyDto {
  int32 id = 1;
  string code = 2;
  string name = 3;
}
