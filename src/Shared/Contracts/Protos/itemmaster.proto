syntax = "proto3";

package inventory.item;
option csharp_namespace = "GrpcServices.Inventory.Item";

service ItemService {
  rpc GetItemAutoComplete (ItemAutoCompleteRequest) returns (ItemAutoCompleteResponse);
  rpc GetItemsByIds (ItemsByIdsRequest) returns (ItemAutoCompleteResponse);
}

message ItemAutoCompleteRequest {
  string search = 1;
  int32 itemGroupId = 2;
  int32 itemCategoryId = 3;
  int32 sourceId = 4;
  int32 issueRuleId = 5;
  int32 take   = 6;
}

message ItemsByIdsRequest {
  repeated int32 ids = 1;
}

message ItemVendor {
  int32 supplierId     = 1;
  int32 unitId         = 2;
  string supplierPartNo = 3;
  bool defaultSupplier  = 4;
  int32 leadTime       = 5;
  double moq           = 6;
  int32 moqUomId       = 7;
  int32 packageUomId   = 8;
  double packageValue  = 9;
}

message ItemMaster {
  int32 id        = 1;
  string itemName = 2;
  string itemCode = 3;
  int32 HSNId     = 4;
  string HSNCode  = 5;
  double GSTPercentage = 6;
  int32 ItemCategoryId = 7;
  int32 ItemGroupId    = 8;  
  int32 SourceOfItem   = 9;  
  string TariffNumber  = 10;
  bool IsOnSpot        = 11;
  repeated ItemVendor vendors = 12;
}

message ItemAutoCompleteResponse {
  repeated ItemMaster items = 1;
}
