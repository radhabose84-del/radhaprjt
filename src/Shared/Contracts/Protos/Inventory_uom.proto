syntax = "proto3";
option csharp_namespace = "Inventory.Grpc";

service InventoryUOMService {
  rpc GetAllUOMs   (GetAllUOMsRequest)   returns (UOMListResponse);
  rpc GetUOMById   (GetUOMByIdRequest)   returns (UOMResponse);
  rpc GetUOMByName (GetUOMByNameRequest) returns (UOMResponse);
}

message GetAllUOMsRequest {}
message GetUOMByIdRequest { int32 id = 1; }
message GetUOMByNameRequest { string name = 1; int32 excludeId = 2; }

message UOMMasterDto {
  int32  id        = 1;
  string code      = 2;
  string uomName   = 3;
  int32  uomTypeId = 4;
  bool   isActive  = 5;
}

message UOMListResponse   { repeated UOMMasterDto items = 1; }
message UOMResponse       { UOMMasterDto item = 1; }
