syntax = "proto3";

option csharp_namespace = "GrpcServices.BudgetManagement";

service BudgetGroupService {
  rpc GetBudgetGroupById (GetBudgetGroupByIdRequest) returns (BudgetGroupMasterDto);
}

message GetBudgetGroupByIdRequest {
  int32 id = 1;
}

message BudgetGroupMasterDto {
  int32 id = 1;
  string name = 2;
  string description = 3;
  int32 unitId = 4;
  string unitName = 5;
  int32 departmentId = 6;
  string departmentName = 7;
  int32 costCenterId = 8;
  string costCenterName = 9;
  int32 parentBudgetGroupId = 10;
  string parentBudgetGroupName = 11;
  int32 currencyId = 12;
  int32 allocationRuleId = 13;
  string allocationRuleName = 14;
  double allocatedPercentage = 15;
  double allocatedSpindleCost = 16;
  bool isParent = 17;
  bool isActive = 18;
}
