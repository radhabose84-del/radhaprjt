syntax = "proto3";

option csharp_namespace = "UserService.Grpc";

// ===============================
// Financial Year gRPC Service
// ===============================
service FinancialYearService {
  rpc GetAll (GetFinancialYearPagedRequest) returns (GetFinancialYearPagedResponse);
  rpc GetById (GetFinancialYearByIdRequest) returns (GetFinancialYearByIdResponse);
  rpc SearchByYear (FinancialYearAutoCompleteRequest) returns (FinancialYearListResponse);
}

// ===============================
// Requests
// ===============================
message GetFinancialYearPagedRequest {
  int32 pageNumber = 1;
  int32 pageSize = 2;
  string searchTerm = 3; // optional search
}

message GetFinancialYearByIdRequest {
  int32 id = 1;
}

message FinancialYearAutoCompleteRequest {
  string searchTerm = 1;
}

// ===============================
// Responses
// ===============================
message GetFinancialYearPagedResponse {
  repeated FinancialYearDto items = 1;
  int32 totalCount = 2;
}

message GetFinancialYearByIdResponse {
  FinancialYearDto financialYear = 1;
}

message FinancialYearListResponse {
  repeated FinancialYearDto items = 1;
}

// ===============================
// DTO
// ===============================
message FinancialYearDto {
  int32 id = 1;
  string startYear = 2;
  string startDate = 3; // DateTimeOffset → string
  string endDate = 4;   // DateTimeOffset → string
  string finYearName = 5;
}
