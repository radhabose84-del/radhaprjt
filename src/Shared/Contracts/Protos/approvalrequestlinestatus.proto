syntax = "proto3";

import "google/protobuf/empty.proto";

option csharp_namespace = "GrpcServices.BackgroundService.Line";

service ApprovalRequestLineStatusService {
    rpc GetApprovalRequestLine (ApprovalStatusRequest) returns (ApprovalLineStatusListResponse);
    rpc GetApprovalRequestLineStatus (ApprovalStatusRequest) returns (ApprovalLineStatusListResponse);
}
message ApprovalStatusRequest {
    string ModuleTypeName = 1;
    repeated int32 module_transaction_ids = 2;
    int32 UserId = 3;
}

message ApprovalRequestLineStatusDto {
    int32 ModuleLineTransactionId = 1;
    int32 ApprovalRequestLineTransactionId =2;
    string Status = 3;
}
message ApprovalLineStatusListResponse {
    repeated ApprovalRequestLineStatusDto approvalstatus = 1;
}