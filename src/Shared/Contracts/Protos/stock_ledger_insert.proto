syntax = "proto3";

option csharp_namespace = "GrpcServices.InventoryManagement";

// ------------------------------------
// Stock Ledger Insert Service
// ------------------------------------
service StockLedgerInsertService {

  rpc InsertStockLedger
      (InsertStockLedgerRequest)
      returns (InsertStockLedgerResponse);

  rpc InsertSubStoreStockLedger
      (InsertSubStoreStockLedgerRequest)
      returns (InsertSubStoreStockLedgerResponse);
}

// ------------------------------------
// Stock Ledger DTO
// ------------------------------------
message StockLedgerDto {
  int32 unitId = 1;
  string docType = 2;
  int32 docNo = 3;
  int32 docSlNo = 4;
  string docDate = 5;        // yyyy-MM-dd
  int32 itemId = 6;
  int32 uomId = 7;
  int32 warehouseId = 8;
  int32 storageTypeId = 9;
  int32 targetId = 10;
  double receivedQty = 11;
  double receivedValue = 12;
  double issueQty = 13;
  double issueValue = 14;
}

message InsertStockLedgerRequest {
  repeated StockLedgerDto stockLedgers = 1;
}

message InsertStockLedgerResponse {
  bool success = 1;
  string error = 2;
}

// ------------------------------------
// SubStore Stock Ledger DTO
// ------------------------------------
message SubStoreStockLedgerDto {
  int32 unitId = 1;
  string docType = 2;
  int32 docNo = 3;
  int32 docSlNo = 4;
  string docDate = 5;        // yyyy-MM-dd
  int32 departmentId = 6;
  int32 itemId = 7;
  int32 uomId = 8;
  int32 warehouseId = 9;
  int32 storageTypeId = 10;
  int32 targetId = 11;
  double receivedQty = 12;
  double receivedValue = 13;
  double issueQty = 14;
  double issueValue = 15;
}

message InsertSubStoreStockLedgerRequest {
  repeated SubStoreStockLedgerDto subStoreStockLedgers = 1;
}

message InsertSubStoreStockLedgerResponse {
  bool success = 1;
  string error = 2;
}
