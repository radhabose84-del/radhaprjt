syntax = "proto3";

import "google/protobuf/empty.proto";

option csharp_namespace = "GrpcServices.MaintenanceManagement";

service CostCenterService {
    rpc GetAllCostCenter (google.protobuf.Empty) returns (CostCenterListResponse);
    rpc GetCostCenterById (GetCostCenterByIdRequest) returns (CostCenterDto);
}

message GetCostCenterByIdRequest {
    int32 Id = 1;
}

message CostCenterDto {
    int32 Id = 1;
    string CostCenterCode = 2;
    string CostCenterName = 3;
    int32 UnitId = 4;
    string UnitName = 5;
    int32 DepartmentId = 6;
    string DepartmentName = 7;
    string EffectiveDate = 8;
    string ResponsiblePerson = 9;
    double BudgetAllocated = 10;
    string Remarks = 11;
    int32 IsActive = 12;
}

message CostCenterListResponse {
    repeated CostCenterDto CostCenters = 1;
}
