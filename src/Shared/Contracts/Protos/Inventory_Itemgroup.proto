syntax = "proto3";

option csharp_namespace = "Inventory.Grpc";

// Service to expose ItemGroup data
service InventoryItemGroupService  {
  rpc GetAllItemGroups (GetAllItemGroupsRequest) returns (ItemGroupListResponse);
}

// Empty request for getting all item groups
message GetAllItemGroupsRequest {}

// ItemGroup DTO mapped exactly to your C# DTO and DB columns
message ItemGroupDto {
  int32 id = 1;
  int32 unitId = 2;
  string itemGroupCode = 3;
  string itemGroupName = 4;
  bool isActive = 5;
 
}

// Response containing the list of item groups
message ItemGroupListResponse {
  repeated ItemGroupDto items = 1;
}
