syntax = "proto3";

option csharp_namespace = "GrpcServices.Warehouse.Warehouse";
package warehouse.master;

service WarehouseService {
  rpc GetAllWarehouseMaster (WarehouseListRequest) returns (WarehouseListResponse);
  rpc GetWarehouseById      (GetWarehouseByIdRequest) returns (WarehouseDto);
}

message WarehouseListRequest {
  int32 pageNumber = 1;   // default 1
  int32 pageSize   = 2;   // default 15
  string search    = 3;   // optional
}

message WarehouseListResponse {
  repeated WarehouseDto items = 1;
  int32 totalCount = 2;
  int32 pageNumber = 3;
  int32 pageSize   = 4;
}

message GetWarehouseByIdRequest { int32 id = 1; }

message WarehouseDto {
  int32 id = 1;
  int32 unitId = 2;

  string warehouseCode = 3;
  string warehouseName = 4;

  int32 warehouseTypeId = 5;
  int32 storageTypeId   = 6;
  int32 areaTypeId      = 7;
  int32 operationTypeId = 8;

  double capacity     = 9;
  int32 capacityUOMId = 10;

  int32 cityId    = 11;
  int32 stateId   = 12;
  int32 countryId = 13; 
  int32 parentWarehouseId=14;
}
