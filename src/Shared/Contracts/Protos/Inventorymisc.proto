syntax = "proto3";

option csharp_namespace = "Inventory.Grpc";

service MiscMasterService {
  rpc GetMiscMasterById (GetMiscMasterByIdRequest) returns (MiscMastersListResponse);

  // ✅ New RPC: returns the 4 type IDs in one call
  rpc GetMiscTypeIds (GetMiscTypeIdsRequest) returns (GetMiscTypeIdsResponse);
}

message GetMiscMasterByIdRequest {
  string misctype = 1;
}

message GetMiscTypeIdsRequest {} // empty request

message GetMiscTypeIdsResponse {
  int32 warehouse_type_id = 1;
  int32 storage_type_id   = 2;
  int32 area_type_id      = 3;
  int32 operation_type_id = 4;
  int32 floor_type_id     = 5;
  int32 warehouse_aisle_type_id     = 6;
  int32 warehouse_rack_level_type_id = 7;
}

message MiscMasterDto {
  int32 id = 1;
  string code = 2;
  string description = 3;
  int32 misc_type_id = 4;
}

message MiscMastersListResponse {
  repeated MiscMasterDto items = 1;
}