syntax = "proto3";
option csharp_namespace = "Shared.Grpc";
package location;

message LocationRequest {
  string city = 1;
  string state = 2;
  string country = 3;
}

message LocationResponse {
  int32 cityId = 1;
  int32 stateId = 2;
  int32 countryId = 3;
}

service LocationService {
  rpc GetOrCreateLocation(LocationRequest) returns (LocationResponse);
}