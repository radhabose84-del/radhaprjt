syntax = "proto3";

import "google/protobuf/empty.proto";

option csharp_namespace = "GrpcServices.BackgroundService";

service IndentByIdService {
    rpc GetIndentById(IndentRequest) returns (IndentResponse);
}
message IndentRequest {
    int32 Id = 1;
}
message IndentDetailDto {
    int32 Id = 1;
    int32 IndentHeaderId = 2;
    int32 ItemId = 3;
    double QuantityRequired = 4;
    string RequiredDate = 5;
    double TotalEstimatedCost = 6;
    int32 PRConsumptionDays = 7;
    string Remark = 8;
}
message IndentDto {
    int32 Id = 1;
    string IndentNumber = 2;
    string IndentDate = 3;
    int32 IndentTypeId = 4;
    int32 UnitId = 5;
    int32 DepartmentId = 6;
    string Purpose = 7;

    repeated IndentDetailDto indent_details = 8;
}



message IndentResponse {
    IndentDto indent = 1;
}