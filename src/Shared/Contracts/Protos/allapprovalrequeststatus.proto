syntax = "proto3";

import "google/protobuf/empty.proto";

option csharp_namespace = "GrpcServices.BackgroundService";

service ApprovalRequestStatusAllService {
    rpc GetApprovalRequestStatusAll (ApprovalStatusRequest) returns (ApprovalStatusAllListResponse);
}
message ApprovalStatusRequest {
    string ModuleTypeName = 1;
}
message ApprovalRequestStatusDto {
    int32 Id = 1;
    int32 ModuleTransactionId = 2;
    int32 ApprovalRequestId = 3;
    string CurrentStatus = 4;
    string ModuleTypeName = 5;
}

message ApprovalStatusAllListResponse {
    repeated ApprovalRequestStatusDto approvalstatus = 1;
}