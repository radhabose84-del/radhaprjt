syntax = "proto3";
option csharp_namespace = "GrpcServices.Party";
package party;

service PartyService {
  rpc GetPartyById (GetPartyByIdRequest) returns (PartyByIdResponse);
}

message GetPartyByIdRequest { int32 id = 1; }

message PartyContactDto {
  int32 id = 1;
  string firstName = 2;
  string lastName  = 3;
  string email     = 4;
  string mobile    = 5;
  string contactType = 6;
}

message PartyDto {
  int32 id = 1;
  string partyCode = 2;
  string partyName = 3;
  string partyPan  = 4;
  string partyGst  = 5;
  string website   = 6;
  repeated PartyContactDto contacts = 100;
}

message PartyByIdResponse { PartyDto party = 1; }
