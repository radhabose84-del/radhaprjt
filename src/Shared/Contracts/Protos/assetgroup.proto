syntax = "proto3";

option csharp_namespace = "GrpcServices.FixedAsset";

package assetgroup;

// -------- Messages --------
message AssetGroupMessage {
  int32 id = 1;
  string code = 2;
  string groupName = 3;
}

message GetAssetGroupByIdRequest {
  int32 id = 1;
}

message GetAssetGroupByIdResponse {
  AssetGroupMessage item = 1;
}

message GetAssetGroupsByIdsRequest {
  repeated int32 ids = 1;
}

message GetAssetGroupsByIdsResponse {
  repeated AssetGroupMessage items = 1;
}

// -------- Service --------
service AssetGroupService {
  rpc GetAssetGroupById (GetAssetGroupByIdRequest) returns (GetAssetGroupByIdResponse);
  rpc GetAssetGroupsByIds (GetAssetGroupsByIdsRequest) returns (GetAssetGroupsByIdsResponse);
}
