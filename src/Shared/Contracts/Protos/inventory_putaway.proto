syntax = "proto3";

option csharp_namespace = "Inventory.Grpc.Protos.PutAway";
package inventory.putaway;

// ===============================
// REQUEST MESSAGE
// ===============================
message GetPutAwayRuleRequest {
  repeated int32 item_ids = 1;  // List of Item IDs to fetch rules for
  repeated int32 warehouse_ids = 2;  // Optional list of Warehouse IDs
}

// ===============================
// NEW REQUEST MESSAGE (With Warehouse filter)
// ===============================
message GetPutAwayRuleByWarehouseRequest {
  repeated int32 item_ids = 1;       // List of Item IDs
  repeated int32 warehouse_ids = 2;  // Optional list of Warehouse IDs
}

// ===============================
// RESPONSE MESSAGE (Single Record)
// ===============================
message PutAwayRuleDetail {
  int32 put_away_rule_id = 1;
  int32 storage_type_id = 2;
  string storage_type_name = 3;

  int32 target_id = 4;
  string target_code = 5;
  string target_name = 6;

  int32 priority_id = 7;
  string priority_name = 8;

  int32 warehouse_id = 9;
  string warehouse_code = 10;
  string warehouse_name = 11;

  int32 unit_id = 12; // ✅ Still included in response (derived from token)
  int32 item_id = 13;
  string item_code = 14;

  int32 rule_item_id = 15;
  int32 item_category_id = 16;
  string item_category_name = 17;

  int32 item_group_id = 18;
  string item_group_name = 19;
  
  int32 item_stock_uom_id = 20;
  string item_stock_uom = 21;
  int32 item_purchase_uom_id = 22;
  string item_purchase_uom = 23;
  string item_item_name = 24;
  double item_conversionRate = 25; // ✅ Fixed type

}

// ===============================
// RESPONSE WRAPPER (Multiple Records)
// ===============================
message GetPutAwayRuleResponse {
  repeated PutAwayRuleDetail rules = 1;
}

// ===============================
// SERVICE DEFINITION
// ===============================
service PutAwayRuleService {
  // Fetch PutAway rule details based on list of Item IDs
  rpc GetPutAwayRuleDetails(GetPutAwayRuleRequest)
      returns (GetPutAwayRuleResponse);

     // ✅ New method with optional warehouse filter
  rpc GetPutAwayRuleDetailsByWarehouse(GetPutAwayRuleByWarehouseRequest)
      returns (GetPutAwayRuleResponse);
}
