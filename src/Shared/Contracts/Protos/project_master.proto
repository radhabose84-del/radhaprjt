syntax = "proto3";

option csharp_namespace = "ProjectManagement.ProjectMasterGrpc";

import "google/protobuf/timestamp.proto";

package projectmaster;

// ---------- DTOs ----------

// Full Project Master details
message ProjectMasterDto {
  int32 id = 1;
  string projectCode = 2;
  string projectName = 3;
  string projectDescription = 4;

  int32 projectTypeId = 5;
  int32 unitId = 6;
  int32 departmentId = 7;

  double budgetAmount = 8;
  int32 budgetYearId = 9;
  int32 costCenterId = 10;
  int32 currencyId = 11;

  google.protobuf.Timestamp startDate = 12;
  google.protobuf.Timestamp endDate = 13;

  int32 projectCategoryId = 14;
  int32 assetGroupId = 15;

  string purposeRemarks = 16;

  bool isActive = 17;
  bool isDeleted = 18;

  int32 statusId = 19;
  
}

// Lightweight DTO for dropdowns/autocomplete
message ProjectMasterAutoCompleteDto {
  int32 id = 1;
  string projectCode = 2;
  string projectName = 3;
  string projectDescription = 4;
  int32 unitId = 5;
  int32 departmentId = 6;
  int32 statusId = 7;
}

// ---------- Requests / Responses ----------

message GetProjectMasterByIdRequest {
  int32 id = 1;
}

message GetProjectMasterByIdResponse {
  ProjectMasterDto projectMaster = 1;
}

message GetProjectMasterAutoCompleteRequest {
  int32 unitId = 1;             // optional (0 = ignore)
  int32 departmentId = 2;       // optional (0 = ignore)
  string searchTerm = 3;        // optional
  int32 take = 4;              // optional (0 = server default, e.g. 10)
 
}

message GetProjectMasterAutoCompleteResponse {
  repeated ProjectMasterAutoCompleteDto items = 1;
}

// ---------- Service ----------

service ProjectMasterService {
  rpc GetProjectMasterById (GetProjectMasterByIdRequest)
      returns (GetProjectMasterByIdResponse);

  rpc GetProjectMasterAutoComplete (GetProjectMasterAutoCompleteRequest)
      returns (GetProjectMasterAutoCompleteResponse);
}
