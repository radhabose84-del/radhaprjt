syntax = "proto3";

import "google/protobuf/empty.proto";

option csharp_namespace = "GrpcServices.BackgroundService.Line";

service ApproverService {
    rpc GetApprover (ApproverRequest) returns (ApproverListResponse);
    rpc IsApproveWorkflowConfigure (ApproveWorkflowRequest) returns (ApproveWorkFlowResponse);
}
message ApproverRequest {
    string ModuleTypeName = 1;
    repeated int32 module_transaction_ids = 2;
}
message ApproveWorkflowRequest {
    string MenuName = 1;
    int32 UnitId = 2;
    int32 DepartmentId = 3;
}


message ApproverListDto {
    int32 ApprovalRequestId =1;
    string Status = 2;
    string ApproverBinding = 3;
    string ApproverValue = 4;
    int32 ModuleTransactionId =5;
    uint32 IsEdit = 6; 
    
}

message ApproverListResponse {
    repeated ApproverListDto approvalstatus = 1;
}
message ApproveWorkFlowResponse {
    bool isValid = 1;
}