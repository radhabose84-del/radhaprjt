syntax = "proto3";
import "google/protobuf/empty.proto";
option csharp_namespace = "GrpcServices.UserManagement";

package background;

service GetAllUsersJobService {
  rpc GetUserAll (google.protobuf.Empty) returns (UsersAllListResponse);
}

message UsersAllDto {
    int32 userId = 1;
    string userName = 2;
    string email = 3;
    string firstName =4;
    string lastName =5;
}

message UsersAllListResponse {
    repeated UsersAllDto users = 1;
}